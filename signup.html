<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Spoon Restaurant</title>
    <!-- Tab Icon Link -->
    <link rel="icon" href="./Assessts/Images/IconTab2.png">
    <!-- Contact Page Style Sheet Link -->
    <link rel="stylesheet" href="./Assessts/Css Files/signup.css">

</head>

<body>
    <section class="signup">
        <!-- Left Side -->
        <div class="left">
            <div class="overlay">
                <h1>The Golden Spoon</h1>
                <h3>Fine Dining Experience</h3>
                <p>
                    Experience exceptional cuisine, elegant ambiance,
                    and unforgettable moments with every visit.
                </p>
            </div>
        </div>
        <!-- Right Side -->
        <div class="right">
            <div class="form-card">
                <h2>Create Account</h2>
                <p class="subtitle">
                    Join us and reserve your next dining experience.
                </p>
                <form>
                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Full Name">
                    </div>
                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Email Address">
                    </div>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Password">
                    </div>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Confirm Password">
                    </div>
                    <button>Create Account</button>
                </form>
                <div class="or">
                    <span>OR</span>
                </div>
                <div class="social">
                    <a href="#"><i class="fa-brands fa-google"></i> Google</a>
                    <a href="#"><i class="fa-brands fa-facebook-f"></i> Facebook</a>
                </div>
                <p class="login">
                    Already have an account?
                    <a href="#">Sign In</a>
                </p>
            </div>
        </div>
    </section>
</body>

</html>
